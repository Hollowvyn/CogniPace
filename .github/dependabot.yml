version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # High Confidence: Development tools and types
      # These are generally safe to auto-merge if CI passes
      development-dependencies:
        dependency-type: development
        update-types:
          - "minor"
          - "patch"
      
      # Production dependencies: Grouped but separate for more careful review
      production-dependencies:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"
