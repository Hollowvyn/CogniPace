name: Bug report
description: Report a problem in the extension.
labels:
  - bug
body:
  - type: textarea
    id: issue
    attributes:
      label: Issue
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
  - type: dropdown
    id: affected-areas
    attributes:
      label: Affected areas
      multiple: true
      options:
        - Popup
        - Dashboard
        - Overlay
        - Background/runtime
        - Settings/notifications
        - Import/export
        - Build/test/docs
        - Other
        - Not sure
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Versions, screenshots/logs, expected vs actual, attributes, or anything else useful.
