name: Work request
description: Request a product, docs, test, cleanup, or repo improvement.
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should change?
      placeholder: Make the overlay submit state easier to understand after saving a review.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: What problem, friction, or risk does this address?
    validations:
      required: true
  - type: dropdown
    id: affected-areas
    attributes:
      label: Affected areas
      multiple: true
      options:
        - Popup
        - Dashboard
        - Overlay
        - Background/runtime
        - Settings/notifications
        - Import/export
        - Build/test/docs
        - Repo/process
        - Other
        - Not sure
  - type: textarea
    id: done-when
    attributes:
      label: Done when
      description: What outcome or evidence would make this complete?
  - type: textarea
    id: additional-details
    attributes:
      label: Additional details
      description: Add links, screenshots, constraints, validation ideas, or related issues.
