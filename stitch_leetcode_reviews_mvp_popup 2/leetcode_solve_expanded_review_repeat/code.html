<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KINETIC_TERMINAL - Expanded Review</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed": "#001e2b",
              "outline": "#a18d7a",
              "on-secondary-container": "#e3af75",
              "on-error": "#690005",
              "inverse-primary": "#875200",
              "secondary-fixed-dim": "#f2bc82",
              "surface-variant": "#353534",
              "on-secondary-fixed": "#2b1700",
              "surface-container-low": "#1c1b1b",
              "on-surface-variant": "#d9c3ad",
              "tertiary-fixed": "#c0e8ff",
              "primary": "#ffc78b",
              "background": "#131313",
              "primary-fixed-dim": "#ffb867",
              "on-secondary": "#482900",
              "on-primary-container": "#683e00",
              "on-error-container": "#ffdad6",
              "error-container": "#93000a",
              "on-background": "#e5e2e1",
              "inverse-on-surface": "#313030",
              "secondary-container": "#664112",
              "outline-variant": "#544434",
              "surface-tint": "#ffb867",
              "on-primary-fixed": "#2b1700",
              "tertiary-container": "#02c4ff",
              "surface-container-high": "#2a2a2a",
              "on-tertiary": "#003547",
              "surface-bright": "#393939",
              "surface-container-highest": "#353534",
              "on-tertiary-container": "#004d67",
              "on-secondary-fixed-variant": "#633f10",
              "surface-container": "#201f1f",
              "secondary": "#f2bc82",
              "secondary-fixed": "#ffddba",
              "error": "#ffb4ab",
              "tertiary-fixed-dim": "#71d2ff",
              "surface": "#131313",
              "on-primary": "#482900",
              "tertiary": "#94dbff",
              "inverse-surface": "#e5e2e1",
              "on-tertiary-fixed-variant": "#004d66",
              "on-surface": "#e5e2e1",
              "surface-container-lowest": "#0e0e0e",
              "on-primary-fixed-variant": "#673d00",
              "surface-dim": "#131313",
              "primary-fixed": "#ffddba",
              "primary-container": "#ffa116"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        font-size: 1.25rem;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary/30 min-h-screen relative overflow-hidden">
<!-- Background Simulation (LeetCode-like context) -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none grid grid-cols-12 gap-4 p-8">
<div class="col-span-8 bg-surface-container-low rounded-lg p-6 flex flex-col gap-4">
<div class="h-8 bg-surface-container-high w-1/3 rounded"></div>
<div class="h-4 bg-surface-container-high w-full rounded"></div>
<div class="h-4 bg-surface-container-high w-5/6 rounded"></div>
<div class="h-64 bg-surface-container-high w-full rounded mt-4"></div>
</div>
<div class="col-span-4 bg-surface-container-low rounded-lg p-6 flex flex-col gap-4">
<div class="h-48 bg-surface-container-high w-full rounded"></div>
<div class="h-48 bg-surface-container-high w-full rounded"></div>
</div>
</div>
<!-- Overlay Container -->
<div class="fixed bottom-6 right-6 z-50 w-[360px] animate-in fade-in slide-in-from-bottom-4 duration-300">
<!-- TopNavBar (JSON Logic Integration) -->
<header class="flex justify-between items-center px-3 py-2 w-full max-w-md mx-auto bg-[#131313] dark:bg-zinc-950 rounded-t-sm border-b border-zinc-800/50 bg-zinc-900/50 backdrop-blur-md shadow-none">
<div class="font-['Space_Grotesk'] font-bold text-[#ffa116] tracking-widest text-sm">KINETIC_TERMINAL</div>
<div class="flex items-center gap-2">
<button class="text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/80 transition-colors active:scale-95 duration-100 p-1">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<button class="text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/80 transition-colors active:scale-95 duration-100 p-1">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</header>
<!-- Main Expansion Card -->
<div class="bg-surface-container-high shadow-2xl rounded-b-sm flex flex-col">
<!-- Section 1: Header -->
<div class="px-4 py-3 border-b border-outline-variant/15 flex justify-between items-start">
<div>
<h1 class="font-headline text-lg font-bold tracking-tight text-on-surface">2Sum</h1>
<div class="mt-1">
<span class="inline-flex items-center px-2 py-0.5 rounded-full bg-surface-container-highest text-[0.625rem] font-bold tracking-wider text-primary border border-primary/20 uppercase">
                            REPEAT_REVIEW
                        </span>
</div>
</div>
<div class="flex gap-2">
<div class="flex items-center gap-1 bg-surface-container-lowest px-2 py-1 rounded-lg">
<span class="material-symbols-outlined text-[1rem] text-tertiary" data-icon="timer">timer</span>
<span class="font-label text-[0.6875rem] font-medium tracking-wide uppercase text-on-surface-variant">~15m</span>
</div>
<div class="flex items-center gap-1 bg-surface-container-lowest px-2 py-1 rounded-lg">
<span class="material-symbols-outlined text-[1rem] text-tertiary" data-icon="code">code</span>
<span class="font-label text-[0.6875rem] font-medium tracking-wide uppercase text-on-surface-variant">TS</span>
</div>
</div>
</div>
<!-- Section 2: Spaced Repetition Calibration -->
<div class="px-4 py-4 bg-surface-container">
<label class="font-label text-[0.625rem] font-bold text-outline uppercase tracking-[0.1em] mb-3 block">Recalibration Protocol</label>
<div class="grid grid-cols-4 gap-2">
<button class="flex flex-col items-center gap-1 py-2 rounded-lg bg-surface-container-high border border-outline-variant/20 hover:border-error/50 hover:bg-error/5 transition-all group active:scale-95">
<span class="font-label text-[0.6875rem] font-bold text-on-surface-variant group-hover:text-error uppercase">Again</span>
<span class="font-label text-[0.5rem] text-outline group-hover:text-error/70 tracking-tighter">&lt;1m</span>
</button>
<button class="flex flex-col items-center gap-1 py-2 rounded-lg bg-surface-container-high border border-outline-variant/20 hover:border-primary/50 hover:bg-primary/5 transition-all group active:scale-95">
<span class="font-label text-[0.6875rem] font-bold text-on-surface-variant group-hover:text-primary-container uppercase">Hard</span>
<span class="font-label text-[0.5rem] text-outline group-hover:text-primary-container/70 tracking-tighter">2d</span>
</button>
<button class="flex flex-col items-center gap-1 py-2 rounded-lg bg-primary-container/10 border-2 border-primary-container transition-all group active:scale-95">
<span class="font-label text-[0.6875rem] font-bold text-primary-container uppercase">Good</span>
<span class="font-label text-[0.5rem] text-primary/70 tracking-tighter">4d</span>
</button>
<button class="flex flex-col items-center gap-1 py-2 rounded-lg bg-surface-container-high border border-outline-variant/20 hover:border-tertiary/50 hover:bg-tertiary/5 transition-all group active:scale-95">
<span class="font-label text-[0.6875rem] font-bold text-on-surface-variant group-hover:text-tertiary uppercase">Easy</span>
<span class="font-label text-[0.5rem] text-outline group-hover:text-tertiary/70 tracking-tighter">7d</span>
</button>
</div>
</div>
<!-- Section 3: Notes -->
<div class="px-4 py-3 space-y-2">
<label class="font-label text-[0.625rem] font-bold text-outline uppercase tracking-[0.1em] flex justify-between" for="review-notes">
<span>Technical Notes</span>
<span class="text-tertiary/60">Optional</span>
</label>
<textarea class="w-full bg-surface-container-low border-b border-outline-variant/30 focus:border-primary focus:ring-0 text-sm font-body text-on-surface placeholder:text-outline/40 resize-none min-h-[80px] p-2 transition-colors rounded-sm" id="review-notes" placeholder="Capture core logic or pitfalls..."></textarea>
</div>
<!-- Section 4: Actions -->
<div class="px-4 py-4 flex items-center justify-between gap-4 mt-2">
<button class="text-outline hover:text-on-surface text-[0.6875rem] font-bold tracking-widest uppercase transition-colors active:scale-95">
                    DISMISS
                </button>
<button class="flex-1 bg-primary-container hover:bg-primary text-on-primary-container font-headline font-bold text-xs py-2.5 rounded shadow-lg shadow-primary-container/10 transition-all active:scale-[0.97] tracking-widest uppercase">
                    SAVE_REVIEW
                </button>
</div>
<!-- Footer Meta -->
<div class="px-4 py-2 bg-surface-container-lowest flex justify-between items-center opacity-40">
<span class="font-label text-[0.5rem] tracking-widest uppercase">Session ID: 8X-992-K</span>
<span class="font-label text-[0.5rem] tracking-widest uppercase">v1.0.4-stable</span>
</div>
</div>
</div>
<!-- SideNavBar (JSON Logic Integration - Mini floating variant for context) -->
<nav class="fixed left-4 top-1/2 -translate-y-1/2 flex flex-col items-center py-4 z-50 bg-[#131313] dark:bg-zinc-950 w-12 rounded-lg border border-zinc-800/50 gap-6 shadow-2xl">
<div class="font-['Space_Grotesk'] font-bold text-[#ffa116] text-xs">K.L</div>
<div class="flex flex-col gap-4">
<button class="text-[#ffa116] bg-zinc-800/50 rounded p-1.5 transition-all active:scale-97">
<span class="material-symbols-outlined" data-icon="code">code</span>
</button>
<button class="text-zinc-500 hover:text-zinc-200 hover:bg-zinc-900/50 rounded p-1.5 transition-all active:scale-97">
<span class="material-symbols-outlined" data-icon="terminal">terminal</span>
</button>
<button class="text-zinc-500 hover:text-zinc-200 hover:bg-zinc-900/50 rounded p-1.5 transition-all active:scale-97">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
</button>
<button class="text-zinc-500 hover:text-zinc-200 hover:bg-zinc-900/50 rounded p-1.5 transition-all active:scale-97">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
</div>
</nav>
</body></html>
