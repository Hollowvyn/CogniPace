<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kinetic Terminal - Review Overlay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed": "#001e2b",
              "outline": "#a18d7a",
              "on-secondary-container": "#e3af75",
              "on-error": "#690005",
              "inverse-primary": "#875200",
              "secondary-fixed-dim": "#f2bc82",
              "surface-variant": "#353534",
              "on-secondary-fixed": "#2b1700",
              "surface-container-low": "#1c1b1b",
              "on-surface-variant": "#d9c3ad",
              "tertiary-fixed": "#c0e8ff",
              "primary": "#ffc78b",
              "background": "#131313",
              "primary-fixed-dim": "#ffb867",
              "on-secondary": "#482900",
              "on-primary-container": "#683e00",
              "on-error-container": "#ffdad6",
              "error-container": "#93000a",
              "on-background": "#e5e2e1",
              "inverse-on-surface": "#313030",
              "secondary-container": "#664112",
              "outline-variant": "#544434",
              "surface-tint": "#ffb867",
              "on-primary-fixed": "#2b1700",
              "tertiary-container": "#02c4ff",
              "surface-container-high": "#2a2a2a",
              "on-tertiary": "#003547",
              "surface-bright": "#393939",
              "surface-container-highest": "#353534",
              "on-tertiary-container": "#004d67",
              "on-secondary-fixed-variant": "#633f10",
              "surface-container": "#201f1f",
              "secondary": "#f2bc82",
              "secondary-fixed": "#ffddba",
              "error": "#ffb4ab",
              "tertiary-fixed-dim": "#71d2ff",
              "surface": "#131313",
              "on-primary": "#482900",
              "tertiary": "#94dbff",
              "inverse-surface": "#e5e2e1",
              "on-tertiary-fixed-variant": "#004d66",
              "on-surface": "#e5e2e1",
              "surface-container-lowest": "#0e0e0e",
              "on-primary-fixed-variant": "#673d00",
              "surface-dim": "#131313",
              "primary-fixed": "#ffddba",
              "primary-container": "#ffa116"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
            font-size: 18px;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: transparent;
        }
        .tabular-nums {
            font-feature-settings: "tnum";
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #544434;
            border-radius: 2px;
        }
    </style>
</head>
<body class="flex items-end justify-end min-h-screen p-6">
<!-- COMPACT REVIEW OVERLAY CONTAINER -->
<main class="w-[320px] bg-surface border border-outline-variant/30 shadow-2xl overflow-hidden flex flex-col">
<!-- TOP NAV BAR (Shared Component Execution) -->
<nav class="bg-[#131313] dark:bg-zinc-950 flex justify-between items-center px-3 py-2 w-full border-b border-zinc-800/50">
<div class="font-['Space_Grotesk'] font-black text-[#ffa116] tracking-widest text-sm">KINETIC_TERMINAL</div>
<div class="flex gap-2">
<button class="text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/80 transition-colors active:scale-95 duration-100 p-1">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<button class="text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/80 transition-colors active:scale-95 duration-100 p-1">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</nav>
<!-- CONTENT AREA -->
<div class="p-3 space-y-4">
<!-- (1) HEADER SECTION -->
<section class="space-y-1">
<div class="flex items-center justify-between">
<h1 class="font-headline text-on-surface text-lg font-bold tracking-tight">Valid Anagram</h1>
<span class="bg-primary-container/10 text-primary-container text-[0.6rem] font-black px-1.5 py-0.5 rounded-sm tracking-wider border border-primary-container/20">FIRST_SOLVE</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary text-sm" data-icon="terminal">terminal</span>
<p class="text-[0.65rem] font-mono text-on-surface-variant uppercase tracking-widest opacity-60">Session_ID: 0x4f22_stable</p>
</div>
</section>
<!-- (2) FEELING CHIPS -->
<section class="space-y-2">
<label class="font-label text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-widest">FEELING_PARAM</label>
<div class="flex gap-1.5">
<button class="flex-1 py-1 text-[0.65rem] font-bold rounded-sm border border-outline-variant/30 text-on-surface-variant bg-surface-container-low hover:bg-surface-container-high transition-colors">EASY</button>
<button class="flex-1 py-1 text-[0.65rem] font-bold rounded-sm border border-primary-container/40 text-primary-container bg-primary-container/5 hover:bg-primary-container/10 transition-colors">MED</button>
<button class="flex-1 py-1 text-[0.65rem] font-bold rounded-sm border border-outline-variant/30 text-on-surface-variant bg-surface-container-low hover:bg-surface-container-high transition-colors">HARD</button>
</div>
</section>
<!-- (3) TIME CHIPS -->
<section class="space-y-2">
<label class="font-label text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-widest">COMPLETION_WINDOW</label>
<div class="grid grid-cols-4 gap-1.5 tabular-nums">
<button class="py-1 text-[0.65rem] font-medium rounded-sm border border-outline-variant/30 text-on-surface-variant bg-surface-container-low hover:bg-surface-container-high transition-colors">&lt;5m</button>
<button class="py-1 text-[0.65rem] font-medium rounded-sm border border-outline-variant/30 text-on-surface-variant bg-surface-container-low hover:bg-surface-container-high transition-colors">10m</button>
<button class="py-1 text-[0.65rem] font-medium rounded-sm border border-primary-container/40 text-primary-container bg-primary-container/5 hover:bg-primary-container/10 transition-colors">20m</button>
<button class="py-1 text-[0.65rem] font-medium rounded-sm border border-outline-variant/30 text-on-surface-variant bg-surface-container-low hover:bg-surface-container-high transition-colors">30m+</button>
</div>
</section>
<!-- (4) LANGUAGE CHIPS -->
<section class="space-y-2">
<label class="font-label text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-widest">ENVIRONMENT_EXEC</label>
<div class="flex gap-1.5">
<button class="flex-1 py-1 text-[0.65rem] font-bold rounded-sm border border-outline-variant/30 text-on-surface-variant bg-surface-container-low hover:bg-surface-container-high transition-colors">TS</button>
<button class="flex-1 py-1 text-[0.65rem] font-bold rounded-sm border border-tertiary-container/40 text-tertiary-container bg-tertiary-container/5 hover:bg-tertiary-container/10 transition-colors">PYTHON</button>
<button class="flex-1 py-1 text-[0.65rem] font-bold rounded-sm border border-outline-variant/30 text-on-surface-variant bg-surface-container-low hover:bg-surface-container-high transition-colors">C++</button>
</div>
</section>
<!-- (5) NOTES TEXTAREA -->
<section class="space-y-2">
<label class="font-label text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-widest">LOG_NOTES</label>
<div class="relative group">
<textarea class="w-full bg-surface-container-low border-b border-outline-variant/50 text-on-surface text-xs p-2 min-h-[80px] focus:outline-none focus:border-primary transition-all placeholder:text-on-surface-variant/30 resize-none font-mono" placeholder="IDENTIFY PATTERN: Frequency Map..."></textarea>
<div class="absolute bottom-1 right-1 text-[0.5rem] text-on-surface-variant/20 uppercase font-black">STABLE_V1.0.4</div>
</div>
</section>
<!-- (6) CTA PRIMARY ACTION -->
<section class="pt-2">
<button class="w-full bg-primary text-on-primary font-headline font-bold py-2.5 rounded-sm active:scale-[0.97] transition-all flex items-center justify-center gap-2 group">
<span class="text-xs uppercase tracking-widest">SAVE_REVIEW</span>
<span class="material-symbols-outlined text-sm group-hover:translate-x-0.5 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</section>
</div>
<!-- FOOTER / SIDEBAR INDICATOR (Integrated into bottom) -->
<div class="bg-surface-container-low px-3 py-1.5 flex justify-between items-center border-t border-outline-variant/10">
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></div>
<span class="text-[0.6rem] font-mono text-on-surface-variant font-medium">LIVE_INJECTION_ACTIVE</span>
</div>
<div class="flex items-center gap-1 opacity-40">
<span class="material-symbols-outlined text-[10px]" data-icon="history">history</span>
<span class="text-[0.6rem] font-mono">1.2s_LATENCY</span>
</div>
</div>
</main>
<!-- FLOATING DECORATIVE BACKGROUND TO SIMULATE OVERLAY CONTEXT -->
<div class="fixed inset-0 -z-10 bg-[#0a0a0a]" style="background-image: radial-gradient(circle at 2px 2px, #1c1c1c 1px, transparent 0); background-size: 24px 24px;">
<div class="absolute inset-0 bg-gradient-to-br from-background via-transparent to-primary/5 opacity-50"></div>
</div>
</body></html>
