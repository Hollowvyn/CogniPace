<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed": "#001e2b",
              "outline": "#a18d7a",
              "on-secondary-container": "#e3af75",
              "on-error": "#690005",
              "inverse-primary": "#875200",
              "secondary-fixed-dim": "#f2bc82",
              "surface-variant": "#353534",
              "on-secondary-fixed": "#2b1700",
              "surface-container-low": "#1c1b1b",
              "on-surface-variant": "#d9c3ad",
              "tertiary-fixed": "#c0e8ff",
              "primary": "#ffc78b",
              "background": "#131313",
              "primary-fixed-dim": "#ffb867",
              "on-secondary": "#482900",
              "on-primary-container": "#683e00",
              "on-error-container": "#ffdad6",
              "error-container": "#93000a",
              "on-background": "#e5e2e1",
              "inverse-on-surface": "#313030",
              "secondary-container": "#664112",
              "outline-variant": "#544434",
              "surface-tint": "#ffb867",
              "on-primary-fixed": "#2b1700",
              "tertiary-container": "#02c4ff",
              "surface-container-high": "#2a2a2a",
              "on-tertiary": "#003547",
              "surface-bright": "#393939",
              "surface-container-highest": "#353534",
              "on-tertiary-container": "#004d67",
              "on-secondary-fixed-variant": "#633f10",
              "surface-container": "#201f1f",
              "secondary": "#f2bc82",
              "secondary-fixed": "#ffddba",
              "error": "#ffb4ab",
              "tertiary-fixed-dim": "#71d2ff",
              "surface": "#131313",
              "on-primary": "#482900",
              "tertiary": "#94dbff",
              "inverse-surface": "#e5e2e1",
              "on-tertiary-fixed-variant": "#004d66",
              "on-surface": "#e5e2e1",
              "surface-container-lowest": "#0e0e0e",
              "on-primary-fixed-variant": "#673d00",
              "surface-dim": "#131313",
              "primary-fixed": "#ffddba",
              "primary-container": "#ffa116"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
            font-size: 16px;
        }
        .kinetic-blur {
            backdrop-filter: blur(12px);
            background-color: rgba(19, 19, 19, 0.85);
        }
    </style>
</head>
<body class="bg-[#0a0a0a] min-h-screen relative overflow-hidden font-body selection:bg-primary/30 selection:text-primary">
<!-- LEETCODE PAGE MOCKUP BACKGROUND -->
<div class="absolute inset-0 z-0 p-8 opacity-20 pointer-events-none">
<div class="flex gap-4 h-full">
<div class="w-1/3 bg-surface-container-low rounded border border-outline-variant/10 p-4 space-y-4">
<div class="h-8 w-48 bg-surface-container-highest rounded"></div>
<div class="h-4 w-full bg-surface-container-highest rounded"></div>
<div class="h-4 w-5/6 bg-surface-container-highest rounded"></div>
<div class="h-4 w-4/6 bg-surface-container-highest rounded"></div>
</div>
<div class="flex-1 bg-surface-container-low rounded border border-outline-variant/10 p-4">
<div class="h-full w-full bg-[#1e1e1e] rounded flex items-start p-4">
<div class="font-mono text-zinc-600 text-sm">1 class Solution:<br/>2   def twoSum(self, nums, target):<br/>3     pass</div>
</div>
</div>
</div>
</div>
<!-- KINETIC TERMINAL: FLOATING DOCK (COLLAPSED STATE) -->
<div class="fixed bottom-6 right-6 z-50">
<div class="group flex items-center gap-0 bg-surface-container-lowest border border-outline-variant/20 rounded shadow-2xl kinetic-blur overflow-hidden transition-all duration-300 hover:border-primary/40">
<!-- Branding/Indicator Wing -->
<div class="flex items-center justify-center px-2 py-3 bg-surface-container-high border-r border-outline-variant/10">
<div class="relative flex items-center justify-center">
<!-- Status Amber Pulse -->
<div class="absolute w-2 h-2 rounded-full bg-primary animate-ping opacity-75"></div>
<div class="relative w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(255,199,139,0.6)]"></div>
</div>
</div>
<!-- Context Data Section -->
<div class="flex flex-col py-2 px-3 min-w-[160px]">
<div class="flex items-center justify-between gap-4">
<span class="font-headline font-bold text-[10px] tracking-[0.15em] text-primary uppercase">TRACKING_SOLVE</span>
<span class="flex items-center gap-1.5">
<span class="text-[9px] font-medium text-zinc-500 tracking-wider uppercase font-body">Status:</span>
<span class="text-[9px] font-bold text-on-background tracking-wider uppercase font-body">Active</span>
</span>
</div>
<div class="mt-1 flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary-container !text-[12px]" data-icon="terminal">terminal</span>
<span class="text-[11px] font-medium text-on-surface-variant font-body truncate max-w-[120px]">Blind 75 / Arrays</span>
</div>
</div>
<!-- Subtle Interaction Handle -->
<div class="flex items-center px-1.5 py-3 text-zinc-700 hover:text-zinc-400 cursor-pointer transition-colors border-l border-outline-variant/5">
<span class="material-symbols-outlined !text-[14px]" data-icon="unfold_more">unfold_more</span>
</div>
</div>
<!-- Ghost Glow Effect -->
<div class="absolute -inset-1 bg-primary/5 blur-xl -z-10 rounded-full group-hover:bg-primary/10 transition-colors duration-500"></div>
</div>
<!-- TERMINAL METADATA OVERLAY (Visual Flair) -->
<div class="fixed bottom-6 left-6 z-40 hidden md:block">
<div class="font-headline text-[10px] text-zinc-700 tracking-[0.2em] font-bold flex flex-col gap-1">
<div class="flex items-center gap-2">
<div class="w-1 h-1 bg-zinc-800"></div>
<span>KINETIC_TERMINAL v1.0.4</span>
</div>
<div class="flex items-center gap-2">
<div class="w-1 h-1 bg-zinc-800"></div>
<span>SYS_READY_FOR_INPUT</span>
</div>
</div>
</div>
</body></html>
